            type: object
        risks_mitigated:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: string

    NISTSubcategoryUpdateRequest:
      type: object
      properties:
        user_id:
          type: string
          description: User ID for file upload attribution
        project_id:
          type: string
          description: Project ID for file upload association
        status:
          type: string
          enum: [Not started, Draft, In review, Done]
