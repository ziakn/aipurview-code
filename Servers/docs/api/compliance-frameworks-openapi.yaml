          type: integer
        organization_id:
          type: integer

    NISTSubcategory:
      type: object
      properties:
        id:
          type: integer
        subcategory_meta_id:
          type: integer
        organization_id:
          type: integer
        status:
          type: string
          enum: [Not started, Draft, In review, Done]
        owner:
          type: integer
          nullable: true
        reviewer:
          type: integer
          nullable: true
        approver:
          type: integer
          nullable: true
        implementation_details:
          type: string
          nullable: true
