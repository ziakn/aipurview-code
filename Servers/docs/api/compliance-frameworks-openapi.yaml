  /nist-ai-rmf/assignments-by-function:
    get:
      tags: [NIST AI RMF]
      summary: Get assignments grouped by function
      description: Returns assignments for each function (Govern, Map, Measure, Manage).
      responses:
        "200":
          description: Assignments by function
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /nist-ai-rmf/status-breakdown:
    get:
      tags: [NIST AI RMF]
      summary: Get status breakdown
      description: Returns count of subcategories by status.
      responses:
        "200":
          description: Status breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /nist-ai-rmf/overview:
    get:
      tags: [NIST AI RMF]
      summary: Get full NIST AI RMF overview
      description: Returns all functions with categories and subcategories in a nested structure.
      responses:
        "200":
          description: Full overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ==================== Compliance Score ====================
  /compliance/score:
    get:
      tags: [Compliance Score]
      summary: Get compliance score
      description: Retrieves the AI compliance score for the authenticated user's organization.
      responses:
        "200":
          description: Compliance score retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ComplianceScore"
        "400":
          description: Organization ID is required
        "500":
          $ref: "#/components/responses/InternalError"

  /compliance/score/{organizationId}:
    get:
      tags: [Compliance Score]
      summary: Get compliance score by organization
      description: Retrieves compliance score for a specific organization. Requires the user to belong to that organization.
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Compliance score retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ComplianceScore"
        "400":
          description: Invalid organization ID
        "403":
          description: Access denied
        "500":
          $ref: "#/components/responses/InternalError"

  /compliance/details/{organizationId}:
    get:
      tags: [Compliance Score]
      summary: Get detailed compliance breakdown
      description: Returns detailed compliance analysis with insights, strongest/weakest modules, improvement priority, and data quality indicators.
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detailed compliance data retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ComplianceDetails"
        "400":
          description: Invalid organization ID
        "403":
          description: Access denied
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Resource ID

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ---- Generic response wrappers ----
    SuccessResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        data:
          description: Response payload (varies by endpoint)

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        data:
          type: string
          description: Error message

    # ---- Frameworks ----
    Framework:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        organization_id:
          type: integer

    # ---- ISO 27001 ----
    ISO27001Clause:
      type: object
      properties:
        id:
          type: integer
        arrangement:
          type: integer
        title:
          type: string

    ISO27001ClauseWithSubClauses:
      type: object
      properties:
        id:
          type: integer
        arrangement:
          type: integer
        title:
          type: string
        subClauses:
          type: array
          items:
            $ref: "#/components/schemas/ISO27001SubClause"

    ISO27001SubClause:
      type: object
      properties:
        id:
          type: integer
        subclause_meta_id:
          type: integer
        projects_frameworks_id:
          type: integer
        organization_id:
          type: integer
        status:
          type: string
          enum: [Not started, Draft, In review, Done]
        owner:
          type: integer
          nullable: true
        reviewer:
          type: integer
          nullable: true
        approver:
          type: integer
          nullable: true
        implementation_details:
          type: string
          nullable: true
        evidence_links:
          type: array
          items:
            type: object
        risks_mitigated:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: string

    ISO27001Annex:
      type: object
      properties:
        id:
          type: integer
        arrangement:
          type: string
        order_no:
          type: integer
        title:
          type: string

    ISO27001AnnexWithControls:
      type: object
      properties:
        id:
          type: integer
        arrangement:
          type: string
        order_no:
          type: integer
        title:
          type: string
        controls:
          type: array
          items:
            $ref: "#/components/schemas/ISO27001AnnexControl"

    ISO27001AnnexControl:
      type: object
      properties:
        id:
          type: integer
        annexcontrol_meta_id:
          type: integer
        projects_frameworks_id:
          type: integer
        organization_id:
          type: integer
        status:
          type: string
          enum: [Not started, Draft, In review, Done]
        owner:
          type: integer
          nullable: true
        reviewer:
          type: integer
          nullable: true
        approver:
          type: integer
          nullable: true
        implementation_details:
          type: string
          nullable: true
        evidence_links:
          type: array
          items:
            type: object
        risks_mitigated:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: string

    ISO27001SaveClauseRequest:
      type: object
      properties:
        user_id:
          type: string
          description: User ID for file upload attribution
        project_id:
          type: string
          description: Project ID for file upload association
        status:
          type: string
          enum: [Not started, Draft, In review, Done]
        owner:
          type: integer
          nullable: true
        reviewer:
          type: integer
          nullable: true
        approver:
          type: integer
          nullable: true
        implementation_details:
          type: string
        tags:
          type: string
          description: JSON-encoded array of tag strings
        delete:
          type: string
          description: JSON-encoded array of file IDs to unlink
        risksDelete:
          type: string
          description: JSON-encoded array of risk IDs to remove
        risksMitigated:
          type: string
          description: JSON-encoded array of risk IDs to add
        files:
          type: array
          items:
            type: string
            format: binary
          description: Evidence files to upload

    ISO27001SaveAnnexRequest:
