        tags:
          type: string
          description: JSON-encoded array of tag strings
        delete:
          type: string
          description: JSON-encoded array of file IDs to unlink
        risksDelete:
          type: string
          description: JSON-encoded array of risk IDs to remove
        risksMitigated:
          type: string
          description: JSON-encoded array of risk IDs to add
        files:
          type: array
          items:
            type: string
            format: binary
          description: Evidence files to upload

    NISTSubcategoryStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [Not started, Draft, In review, Done]
          description: New status value

    NISTProgress:
      type: object
      properties:
        totalSubcategories:
          type: integer
        doneSubcategories:
          type: integer

    NISTAssignments:
      type: object
      properties:
        totalSubcategories:
          type: integer
        assignedSubcategories:
          type: integer

    # ---- Compliance Score ----
    ComplianceScore:
      type: object
      properties:
        organizationId:
          type: integer
        overallScore:
          type: integer
          minimum: 0
          maximum: 100
        calculatedAt:
          type: string
          format: date-time
        modules:
          type: object
          properties:
            riskManagement:
              $ref: "#/components/schemas/ModuleScore"
            vendorManagement:
              $ref: "#/components/schemas/ModuleScore"
            projectGovernance:
              $ref: "#/components/schemas/ModuleScore"
            modelLifecycle:
              $ref: "#/components/schemas/ModuleScore"
            policyDocumentation:
              $ref: "#/components/schemas/ModuleScore"
        metadata:
          $ref: "#/components/schemas/ComplianceMetadata"

    ModuleScore:
      type: object
      properties:
        score:
          type: number
          minimum: 0
          maximum: 100
        weight:
          type: number
          description: Module weight (sums to 1.0 across all modules)
        components:
          type: array
          items:
            $ref: "#/components/schemas/ComponentScore"
        totalDataPoints:
          type: integer
        qualityScore:
          type: number
          minimum: 0
          maximum: 1
          description: Data completeness indicator

    ComponentScore:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
        weight:
          type: number
        dataPoints:
          type: integer
        details:
          type: object
          description: Module-specific details

    ComplianceMetadata:
      type: object
      properties:
        totalProjects:
          type: integer
        applicableProjects:
          type: integer
        lastUpdated:
          type: string
          format: date-time
        dataFreshness:
          type: object
          properties:
            risks:
              type: string
              format: date-time
            vendors:
              type: string
              format: date-time
            projects:
              type: string
              format: date-time
            models:
              type: string
              format: date-time
            policies:
              type: string
              format: date-time
        calculationMethod:
          type: string
          enum: [balanced_weighted_average]
        version:
          type: string

    ComplianceDetails:
      allOf:
        - $ref: "#/components/schemas/ComplianceScore"
        - type: object
          properties:
            insights:
              type: object
              properties:
                strongestModule:
                  type: object
                  properties:
                    name:
                      type: string
                    score:
                      type: number
                weakestModule:
                  type: object
                  properties:
                    name:
                      type: string
                    score:
                      type: number
                improvementPriority:
                  type: array
                  items:
                    type: object
                    properties:
                      module:
                        type: string
                      score:
                        type: number
                      weight:
                        type: number
                      impact:
                        type: number
                        description: "(100 - score) * weight"
                overallTrend:
                  type: string
                  enum: [up, down, stable]
                dataQuality:
                  type: object
                  properties:
                    riskManagement:
                      type: number
                    vendorManagement:
                      type: number
                    projectGovernance:
                      type: number
                    modelLifecycle:
                      type: number
                    policyDocumentation:
                      type: number

    # ---- Shared ----
    ProgressResponse:
      type: object
      properties:
        total:
          type: integer
        done:
          type: integer

    AssignmentResponse:
      type: object
      properties:
        total:
          type: integer
        assigned:
          type: integer

    RisksResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/Risk"

    Risk:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        risk_level:
          type: string
        status:
          type: string
        organization_id:
          type: integer
