    # =========================================================================

    DependencyGraphResponse:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              label:
                type: string
              type:
                type: string
              metadata:
                type: object
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
        metadata:
          type: object

    ComplianceMappingResponse:
      type: object
      properties:
        mappings:
          type: array
          items:
            type: object
        checklist:
          type: array
          items:
            type: object
        summary:
          type: object

    # =========================================================================
