    # =========================================================================
    # AI Incident Management Schemas
    # =========================================================================

    IncidentType:
      type: string
      enum:
        - Malfunction
        - Unexpected behavior
        - Model drift
        - Misuse
        - Data corruption
        - Security breach
        - Performance degradation

    IncidentSeverity:
      type: string
      enum:
        - Minor
        - Serious
        - Very serious

    IncidentStatus:
      type: string
      enum:
        - Open
        - Investigating
        - Mitigated
        - Closed

    IncidentApprovalStatus:
      type: string
      enum:
        - Approved
        - Rejected
        - Pending
        - Not required

    Incident:
      type: object
      properties:
        id:
          type: integer
        incident_id:
          type: string
          nullable: true
        ai_project:
          type: string
        type:
          $ref: "#/components/schemas/IncidentType"
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        status:
          $ref: "#/components/schemas/IncidentStatus"
        occurred_date:
          type: string
          format: date-time
        date_detected:
          type: string
          format: date-time
        reporter:
          type: string
        categories_of_harm:
          type: array
          items:
            type: string
        affected_persons_groups:
          type: string
          nullable: true
        description:
          type: string
        relationship_causality:
          type: string
          nullable: true
        immediate_mitigations:
          type: string
          nullable: true
        planned_corrective_actions:
          type: string
          nullable: true
        model_system_version:
          type: string
          nullable: true
        interim_report:
          type: boolean
        archived:
          type: boolean
        approval_status:
          $ref: "#/components/schemas/IncidentApprovalStatus"
        approved_by:
          type: string
          nullable: true
        approval_date:
          type: string
          format: date-time
          nullable: true
        approval_notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateIncidentRequest:
      type: object
      required:
        - ai_project
        - type
        - severity
        - status
        - occurred_date
        - date_detected
        - reporter
        - approval_status
        - categories_of_harm
        - description
        - relationship_causality
      properties:
        ai_project:
          type: string
        type:
          $ref: "#/components/schemas/IncidentType"
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        status:
          $ref: "#/components/schemas/IncidentStatus"
        occurred_date:
          type: string
          format: date-time
        date_detected:
          type: string
          format: date-time
        reporter:
          type: string
        approval_status:
          $ref: "#/components/schemas/IncidentApprovalStatus"
        approved_by:
          type: string
        categories_of_harm:
          oneOf:
            - type: array
              items:
                type: string
            - type: string
              description: Comma-separated string (will be split)
        affected_persons_groups:
          type: string
        description:
          type: string
        relationship_causality:
          type: string
        immediate_mitigations:
          type: string
        planned_corrective_actions:
          type: string
        model_system_version:
          type: string
        interim_report:
          type: boolean
          default: false
        archived:
          type: boolean
          default: false
        approval_date:
          type: string
          format: date-time
        approval_notes:
          type: string

