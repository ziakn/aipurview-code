components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    FileId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    FolderId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Period:
      name: period
      in: query
      schema:
        type: string
        pattern: '^\d+d$'
        default: 30d
      description: Time period in days (e.g., "30d", "7d", "90d")

  responses:
    BadRequest:
      description: Validation or input error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ApiResponse:
      type: object
      properties:
        status:
          type: integer
        data:
          description: Response payload

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        data:
          type: string

    # ─── File Manager Schemas ───────────────────────────────────────────────
    FileUploadResponse:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        size:
          type: integer
        mimetype:
          type: string
        upload_date:
          type: string
          format: date-time
        uploaded_by:
          type: integer
        modelId:
          type: integer
          nullable: true
        review_status:
          type: string
          enum: [draft, pending_review]
        approval_workflow_id:
          type: integer
          nullable: true
        approval_request_id:
          type: integer
          nullable: true

    FileListResponse:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileListItem"
        pagination:
          $ref: "#/components/schemas/Pagination"

    FileListItem:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        size:
          type: integer
        formattedSize:
          type: string
        mimetype:
          type: string
        upload_date:
          type: string
          format: date-time
        uploaded_by:
          type: integer
        uploader_name:
          type: string
        uploader_surname:
          type: string
        review_status:
          type: string
        approval_workflow_id:
          type: integer
          nullable: true

    FileSearchResponse:
      type: object
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              filename:
                type: string
              snippet:
                type: string
                description: Highlighted text snippet matching the query
              rank:
                type: number
        pagination:
          $ref: "#/components/schemas/Pagination"

    FileMetadata:
      type: object
      properties:
        id:
          type: integer
        tags:
          type: array
          items:
            type: string
        review_status:
          type: string
          enum: [draft, pending_review, approved, rejected, expired]
        version:
          type: string
        expiry_date:
          type: string
          format: date-time
          nullable: true
        description:
          type: string
          nullable: true

    UpdateFileMetadataRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
          maxItems: 50
          description: Each tag max 100 chars, alphanumeric/spaces/hyphens/underscores only
        review_status:
          type: string
          enum: [draft, pending_review, approved, rejected, expired]
        version:
          type: string
        expiry_date:
          type: string
          format: date-time
        description:
          type: string

    HighlightedFiles:
      type: object
      properties:
        due_for_update:
          type: array
          items:
            type: integer
        pending_approval:
          type: array
          items:
            type: integer
        recently_modified:
          type: array
          items:
            type: integer

    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer

    # ─── Virtual Folder Schemas ─────────────────────────────────────────────
    VirtualFolder:
      type: object
      properties:
        id:
          type: integer
