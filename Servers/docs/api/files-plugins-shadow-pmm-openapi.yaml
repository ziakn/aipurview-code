openapi: 3.0.3
info:
  title: VerifyWise - File Manager, Virtual Folders, Plugins, Shadow AI & Post-Market Monitoring
  version: 1.0.0
  description: |
    OpenAPI specification for File Manager, Virtual Folders, Plugins, Shadow AI,
    and Post-Market Monitoring API domains.

servers:
  - url: /
    description: Relative to API root

security:
  - BearerAuth: []

paths:
  # ===========================================================================
  # FILE MANAGER
  # ===========================================================================
  /file-manager:
    post:
      tags: [File Manager]
      summary: Upload a file
      description: Upload a file to the organization's file manager. Max 30MB.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (PDF, DOC, DOCX, XLS, XLSX, CSV, MD, JPEG, PNG, GIF, WEBP, SVG, BMP, TIFF, MP4, MPEG, MOV, AVI, WMV, WEBM, MKV)
                model_id:
                  type: integer
                  description: Optional model inventory ID to associate
                approval_workflow_id:
                  type: integer
                  description: Optional approval workflow ID to trigger
                source:
                  type: string
                  description: File source label
                  default: File Manager
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/FileUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          description: File size exceeds 30MB
        "415":
          description: Unsupported file type
    get:
      tags: [File Manager]
      summary: List all files
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated file list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/FileListResponse"

  /file-manager/search:
    get:
      tags: [File Manager]
      summary: Full-text search over file contents
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Search results with snippets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/FileSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /file-manager/with-metadata:
    get:
      tags: [File Manager]
      summary: List files with full metadata
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Files with metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /file-manager/highlighted:
    get:
      tags: [File Manager]
      summary: Get highlighted files (due for update, pending approval, recently modified)
      parameters:
        - name: daysUntilExpiry
          in: query
          schema:
            type: integer
            default: 30
        - name: recentDays
          in: query
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Categorized file IDs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/HighlightedFiles"

  /file-manager/{id}:
    get:
      tags: [File Manager]
      summary: Download a file
      description: Admin only. Returns file binary with download headers.
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File binary content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [File Manager]
      summary: Delete a file
      description: Admin, Reviewer, or Editor only.
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /file-manager/{id}/metadata:
    get:
      tags: [File Manager]
      summary: Get file metadata
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/FileMetadata"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [File Manager]
      summary: Update file metadata
      description: Admin, Reviewer, or Editor only.
      parameters:
        - $ref: "#/components/parameters/FileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFileMetadataRequest"
      responses:
        "200":
          description: Updated metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/FileMetadata"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /file-manager/{id}/versions:
    get:
      tags: [File Manager]
      summary: Get file version history
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: List of file versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /file-manager/{id}/preview:
    get:
      tags: [File Manager]
      summary: Preview file content (limited to 5MB)
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: File content for inline display
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: File too large for preview

  # ===========================================================================
  # VIRTUAL FOLDERS
  # ===========================================================================
  /virtual-folders:
    get:
      tags: [Virtual Folders]
      summary: Get all folders (flat list with file counts)
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/VirtualFolder"
    post:
      tags: [Virtual Folders]
      summary: Create a new folder
      description: Admin or Editor only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/VirtualFolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Duplicate folder name in same parent

  /virtual-folders/tree:
    get:
      tags: [Virtual Folders]
      summary: Get folder tree (hierarchical structure)
      responses:
        "200":
          description: Hierarchical folder tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /virtual-folders/uncategorized:
    get:
      tags: [Virtual Folders]
      summary: Get files not assigned to any folder
      responses:
        "200":
          description: List of uncategorized files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /virtual-folders/{id}:
    get:
      tags: [Virtual Folders]
      summary: Get folder by ID
      parameters:
        - $ref: "#/components/parameters/FolderId"
      responses:
        "200":
          description: Folder details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/VirtualFolder"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Virtual Folders]
      summary: Update a folder
      description: Admin or Editor only. System folders cannot be modified.
      parameters:
        - $ref: "#/components/parameters/FolderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderRequest"
      responses:
        "200":
          description: Folder updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/VirtualFolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate folder name
    delete:
      tags: [Virtual Folders]
      summary: Delete a folder (cascades children and mappings)
      description: Admin or Editor only. System folders cannot be deleted.
      parameters:
        - $ref: "#/components/parameters/FolderId"
      responses:
        "200":
          description: Folder deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: boolean
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /virtual-folders/{id}/path:
    get:
      tags: [Virtual Folders]
      summary: Get folder breadcrumb path (root to folder)
      parameters:
        - $ref: "#/components/parameters/FolderId"
      responses:
        "200":
          description: Array of folder path segments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /virtual-folders/{id}/files:
    get:
      tags: [Virtual Folders]
      summary: Get files in a folder
      parameters:
        - $ref: "#/components/parameters/FolderId"
      responses:
        "200":
          description: List of files in the folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Virtual Folders]
      summary: Assign files to a folder
      description: Admin or Editor only.
      parameters:
        - $ref: "#/components/parameters/FolderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignFilesRequest"
      responses:
        "200":
          description: Files assigned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          assigned:
                            type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /virtual-folders/{id}/files/{fileId}:
    delete:
      tags: [Virtual Folders]
      summary: Remove a file from a folder
      description: Admin or Editor only.
      parameters:
        - $ref: "#/components/parameters/FolderId"
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File removed from folder
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          removed:
                            type: boolean

  /files/{id}/folders:
    get:
      tags: [Virtual Folders]
      summary: Get all folders a file belongs to
      parameters:
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: List of folders for the file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    patch:
      tags: [Virtual Folders]
      summary: Bulk update file folder assignments
      description: Admin or Editor only.
      parameters:
        - $ref: "#/components/parameters/FileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folder_ids]
              properties:
                folder_ids:
                  type: array
                  items:
                    type: integer
                  description: Complete set of folder IDs to assign (replaces existing)
      responses:
        "200":
          description: Updated folder assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  # ===========================================================================
  # PLUGINS
  # ===========================================================================
  /plugins/marketplace:
    get:
      tags: [Plugins]
      summary: Get all available plugins from marketplace
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
      responses:
        "200":
          description: List of plugins
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Plugin"

  /plugins/marketplace/search:
    get:
      tags: [Plugins]
      summary: Search plugins
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Matching plugins
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Plugin"
        "400":
          $ref: "#/components/responses/BadRequest"

  /plugins/marketplace/{key}:
    get:
      tags: [Plugins]
      summary: Get plugin by key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      responses:
        "200":
          description: Plugin details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Plugin"
        "404":
          $ref: "#/components/responses/NotFound"

  /plugins/categories:
    get:
      tags: [Plugins]
      summary: Get plugin categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          type: string

  /plugins/install:
    post:
      tags: [Plugins]
      summary: Install a plugin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pluginKey]
              properties:
                pluginKey:
                  type: string
                  pattern: "^[a-z0-9-]+$"
                  description: Plugin key to install
      responses:
        "201":
          description: Plugin installed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/PluginInstallation"
        "400":
          $ref: "#/components/responses/BadRequest"

  /plugins/installations:
    get:
      tags: [Plugins]
      summary: Get installed plugins for organization
      responses:
        "200":
          description: List of installed plugins
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PluginInstallation"

  /plugins/installations/{id}:
    delete:
      tags: [Plugins]
      summary: Uninstall a plugin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Installation ID
      responses:
        "200":
          description: Plugin uninstalled
        "403":
          $ref: "#/components/responses/Forbidden"

  /plugins/installations/{id}/configuration:
    put:
      tags: [Plugins]
      summary: Update plugin configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Installation ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [configuration]
              properties:
                configuration:
                  type: object
                  additionalProperties: true
                  description: Plugin-specific configuration key-value pairs
      responses:
        "200":
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /plugins/{key}/test-connection:
    post:
      tags: [Plugins]
      summary: Test plugin connection with provided configuration
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [configuration]
              properties:
                configuration:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ConnectionTestResult"

  # ===========================================================================
  # SHADOW AI
  # ===========================================================================
  /shadow-ai/api-keys:
    post:
      tags: [Shadow AI - API Keys]
      summary: Create a new API key (Admin only)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  description: Optional label for the key
      responses:
        "201":
          description: API key created (full key shown only once)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ApiKeyCreateResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      tags: [Shadow AI - API Keys]
      summary: List all API keys (Admin only)
      responses:
        "200":
          description: List of API keys (no full key values)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ApiKeyRecord"
        "403":
          $ref: "#/components/responses/Forbidden"

  /shadow-ai/api-keys/{id}:
    delete:
      tags: [Shadow AI - API Keys]
      summary: Revoke an API key (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Key revoked
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /shadow-ai/api-keys/{id}/permanent:
    delete:
      tags: [Shadow AI - API Keys]
      summary: Permanently delete a revoked API key (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Key permanently deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /shadow-ai/insights/summary:
    get:
      tags: [Shadow AI - Insights]
      summary: Get insights summary
      parameters:
        - $ref: "#/components/parameters/Period"
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/InsightsSummary"

  /shadow-ai/insights/tools-by-events:
    get:
      tags: [Shadow AI - Insights]
      summary: Get tools ranked by event count
      parameters:
        - $ref: "#/components/parameters/Period"
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Tools by events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /shadow-ai/insights/tools-by-users:
    get:
      tags: [Shadow AI - Insights]
      summary: Get tools ranked by unique user count
      parameters:
        - $ref: "#/components/parameters/Period"
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Tools by users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /shadow-ai/insights/users-by-department:
    get:
      tags: [Shadow AI - Insights]
      summary: Get user counts by department
      parameters:
        - $ref: "#/components/parameters/Period"
      responses:
        "200":
          description: Users by department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /shadow-ai/insights/trend:
    get:
      tags: [Shadow AI - Insights]
      summary: Get usage trend data
      parameters:
        - $ref: "#/components/parameters/Period"
        - name: granularity
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: daily
      responses:
        "200":
          description: Trend data points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /shadow-ai/users:
    get:
      tags: [Shadow AI - Users]
      summary: Get user activity list
      parameters:
        - $ref: "#/components/parameters/Page"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
          description: Sort field
        - name: department
          in: query
          schema:
            type: string
          description: Filter by department
      responses:
        "200":
          description: Paginated user activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /shadow-ai/users/{email}/activity:
    get:
      tags: [Shadow AI - Users]
      summary: Get detailed activity for a specific user
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
            format: email
        - $ref: "#/components/parameters/Period"
      responses:
        "200":
          description: User detail with tool usage
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/UserDetail"

  /shadow-ai/departments:
    get:
      tags: [Shadow AI - Users]
      summary: Get department activity summary
      responses:
        "200":
          description: Department activity data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /shadow-ai/tools:
    get:
      tags: [Shadow AI - Tools]
      summary: Get detected AI tools
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ShadowAiToolStatus"
        - name: sort
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated tool list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /shadow-ai/tools/{id}:
    get:
      tags: [Shadow AI - Tools]
