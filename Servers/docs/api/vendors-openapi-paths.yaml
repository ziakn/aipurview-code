/vendors:
  get:
    tags:
      - Vendors
    summary: Get all vendors
    description: Retrieves all vendors for the authenticated user's organization, ordered by creation date descending. Each vendor includes its associated project IDs and the reviewer's full name.
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Vendors retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: OK
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/VendorWithReviewerName"
      "204":
        description: No vendors found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: No Content
                data:
                  type: "null"
      "401":
        description: Unauthorized — missing or invalid JWT
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Internal Server Error
                error:
                  type: string

  post:
    tags:
      - Vendors
    summary: Create a vendor
    description: |
      Creates a new vendor in the authenticated user's organization.
      Validates required fields, checks demo restrictions, associates
      projects via the vendors_projects join table, records creation
      in change history, fires automation triggers (`vendor_added`),
      and sends in-app assignment notifications to assignee and reviewer.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/VendorInput"
    responses:
      "201":
        description: Vendor created successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Created
                data:
                  $ref: "#/components/schemas/Vendor"
      "400":
        description: Validation error (missing or invalid required fields)
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Bad Request
                data:
                  type: string
                  description: Validation error message
      "401":
        description: Unauthorized — missing or invalid JWT
      "403":
        description: Business logic error (e.g. demo vendor restriction)
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Forbidden
                data:
                  type: string
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Internal Server Error
                error:
                  type: string
      "503":
        description: Service unavailable — vendor creation returned null
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Service Unavailable
                error:
                  type: object

/vendors/project-id/{id}:
  get:
    tags:
      - Vendors
    summary: Get vendors by project ID
    description: Retrieves all vendors associated with a specific project. Returns 404 if the project does not exist.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Project ID
    responses:
      "200":
        description: Vendors retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: OK
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/Vendor"
      "401":
        description: Unauthorized — missing or invalid JWT
      "404":
        description: Project not found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Not Found
                data:
                  type: array
                  items: {}
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Internal Server Error
                error:
                  type: string

/vendors/{id}:
  get:
    tags:
      - Vendors
    summary: Get vendor by ID
    description: Retrieves a single vendor by its ID, including associated project IDs.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Vendor ID
    responses:
      "200":
        description: Vendor retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: OK
                data:
                  $ref: "#/components/schemas/Vendor"
      "401":
        description: Unauthorized — missing or invalid JWT
      "404":
        description: Vendor not found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Not Found
                data:
                  type: "null"
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Internal Server Error
                error:
                  type: string

  patch:
    tags:
      - Vendors
    summary: Update a vendor
    description: |
      Partially updates an existing vendor. Only provided fields are updated.
      Review and scorecard fields can be explicitly set to null to clear them.
      Required fields (vendor_name, vendor_provides, website, vendor_contact_person)
      are only updated if they have a non-empty value.
      Records field-level changes in change history, fires automation triggers
      (`vendor_updated`), and sends in-app notifications when assignee or reviewer changes.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Vendor ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/VendorUpdate"
    responses:
      "202":
        description: Vendor updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Accepted
                data:
                  $ref: "#/components/schemas/Vendor"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Bad Request
                data:
                  type: string
      "401":
        description: Unauthorized — missing or invalid JWT, or missing userId/role
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Unauthorized
      "403":
        description: Business logic error (e.g. demo vendor restriction)
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Forbidden
                data:
                  type: string
      "404":
        description: Vendor not found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Not Found
                data:
                  type: object
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Internal Server Error
                error:
                  type: string

  delete:
    tags:
      - Vendors
    summary: Delete a vendor
    description: |
      Deletes a vendor and all associated data in a transaction:
      1. Deletes vendor risks (vendor_risks table)
      2. Deletes project associations (vendors_projects table)
      3. Deletes the vendor record itself
      Fires automation triggers (`vendor_deleted`).
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Vendor ID
    responses:
      "202":
        description: Vendor deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Accepted
                data:
                  type: boolean
                  example: true
      "401":
        description: Unauthorized — missing or invalid JWT
      "404":
        description: Vendor not found
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Not Found
                data:
                  type: object
      "500":
        description: Internal server error
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Internal Server Error
                error:
                  type: string
