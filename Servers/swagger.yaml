openapi: 3.0.0
info:
  title: 'VerifyWise API'
  description: 'AI Governance Platform API'
  version: 2.0.0
servers:
  -
    url: /api
    description: 'Main API server'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      description: 'The numeric project ID'
      schema:
        type: integer
        example: 1
    PolicyId:
      name: id
      in: path
      required: true
      description: 'Numeric ID of the policy'
      schema:
        type: integer
        example: 42
  schemas:
    Error:
      type: object
      properties:
        data:
          type: string
    AiRiskClassification:
      type: string
      enum:
        - Prohibited
        - 'High risk'
        - 'Limited risk'
        - 'Minimal risk'
      description: 'EU AI Act risk classification level'
    HighRiskRole:
      type: string
      enum:
        - Deployer
        - Provider
        - Distributor
        - Importer
        - 'Product manufacturer'
        - 'Authorized representative'
      description: 'Role of the organization under the EU AI Act for high-risk systems'
    ProjectStatus:
      type: string
      enum:
        - 'Not started'
        - 'In progress'
        - 'Under review'
        - Completed
        - Closed
        - 'On hold'
        - Rejected
      description: 'Current lifecycle status of the project'
    CreateProjectRequest:
      type: object
      required:
        - project_title
        - owner
        - start_date
        - framework
      properties:
        project_title:
          type: string
          example: 'Customer Support Chatbot'
        owner:
          type: integer
          example: 1
        start_date:
          type: string
          format: date-time
          example: '2026-01-15T00:00:00.000Z'
        geography:
          type: integer
          default: 1
          example: 1
        ai_risk_classification:
          $ref: '#/components/schemas/AiRiskClassification'
        type_of_high_risk_role:
          $ref: '#/components/schemas/HighRiskRole'
        goal:
          type: string
          nullable: true
          example: 'Automate tier-1 support queries'
        target_industry:
          type: string
          nullable: true
          example: 'Financial Services'
        description:
          type: string
          nullable: true
          example: 'An LLM-powered chatbot for handling customer inquiries'
        status:
          $ref: '#/components/schemas/ProjectStatus'
        is_organizational:
          type: boolean
          default: false
        members:
          type: array
          items:
            type: integer
          example:
            - 2
            - 3
            - 5
        framework:
          type: array
          items:
            type: integer
          example:
            - 1
            - 2
        approval_workflow_id:
          type: integer
          nullable: true
          example: null
        enable_ai_data_insertion:
          type: boolean
          default: false
    UpdateProjectRequest:
      type: object
      properties:
        project_title:
          type: string
        owner:
          type: integer
        start_date:
          type: string
          format: date-time
        geography:
          type: integer
        ai_risk_classification:
          $ref: '#/components/schemas/AiRiskClassification'
        type_of_high_risk_role:
          $ref: '#/components/schemas/HighRiskRole'
        goal:
          type: string
          nullable: true
        target_industry:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        last_updated:
          type: string
          format: date-time
        last_updated_by:
          type: integer
        members:
          type: array
          items:
            type: integer
          example:
            - 2
            - 3
            - 5
    ProjectFramework:
      type: object
      properties:
        project_framework_id:
          type: integer
        framework_id:
          type: integer
        name:
          type: string
          example: 'EU AI Act'
    Project:
      type: object
      properties:
        id:
          type: integer
          example: 42
        uc_id:
          type: string
          example: UC-7
        project_title:
          type: string
          example: 'Customer Support Chatbot'
        owner:
          type: integer
          example: 1
        start_date:
          type: string
          format: date-time
        geography:
          type: integer
          example: 1
        ai_risk_classification:
          $ref: '#/components/schemas/AiRiskClassification'
        type_of_high_risk_role:
          $ref: '#/components/schemas/HighRiskRole'
        goal:
          type: string
          nullable: true
        target_industry:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        last_updated:
          type: string
          format: date-time
        last_updated_by:
          type: integer
        created_at:
          type: string
          format: date-time
        is_organizational:
          type: boolean
        is_demo:
          type: boolean
        approval_workflow_id:
          type: integer
          nullable: true
        pending_frameworks:
          type: string
          nullable: true
        enable_ai_data_insertion:
          type: boolean
        organization_id:
          type: integer
        framework:
          type: array
          items:
            $ref: '#/components/schemas/ProjectFramework'
        members:
          type: array
          items:
            type: integer
    ProjectListItem:
      allOf:
        -
          $ref: '#/components/schemas/Project'
        -
          type: object
          properties:
            has_pending_approval:
              type: boolean
            approval_status:
              type: string
              nullable: true
              enum:
                - pending
                - rejected
                - null
            _source:
              type: string
              nullable: true
              example: jira-assets
    ProjectDetail:
      allOf:
        -
          $ref: '#/components/schemas/Project'
        -
          type: object
          properties:
            owner_name:
              type: string
              example: 'John Doe'
            has_pending_approval:
              type: boolean
            approval_status:
              type: string
              nullable: true
              enum:
                - pending
                - rejected
                - null
    ProjectWithMembers:
      allOf:
        -
          $ref: '#/components/schemas/Project'
        -
          type: object
          properties:
            members:
              type: array
              items:
                type: integer
    ProjectStats:
      type: object
      properties:
        user:
          type: object
          properties:
            name:
              type: string
            surname:
              type: string
            email:
              type: string
              format: email
            project_last_updated:
              type: string
              format: date-time
            userWhoUpdated:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                surname:
                  type: string
                email:
                  type: string
                  format: email
    ProjectRiskCount:
      type: object
      properties:
        risk_level_autocalculated:
          type: string
          example: High
        count:
          type: string
          example: '3'
    VendorRiskCount:
      type: object
      properties:
        risk_level:
          type: string
          example: Critical
        count:
          type: string
          example: '2'
    ComplianceProgress:
      type: object
      properties:
        allsubControls:
          oneOf:
            -
              type: string
            -
              type: integer
          example: '45'
        allDonesubControls:
          oneOf:
            -
              type: string
            -
              type: integer
          example: '12'
    AssessmentProgress:
      type: object
      properties:
        totalQuestions:
          oneOf:
            -
              type: string
            -
              type: integer
          example: '80'
        answeredQuestions:
          oneOf:
            -
              type: string
            -
              type: integer
          example: '35'
    ControlCategory:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        name:
          type: string
        organization_id:
          type: integer
        controls:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              control_category_id:
                type: integer
              title:
                type: string
              description:
                type: string
              status:
                type: string
              numberOfSubcontrols:
                type: integer
              numberOfDoneSubcontrols:
                type: integer
              subControls:
                type: array
                items:
                  type: object
                  properties: {id: {type: integer}, control_id: {type: integer}, title: {type: string}, description: {type: string}, status: {type: string, enum: [Draft, 'In progress', Done]}, organization_id: {type: integer}}
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: 'Not Found'
        data:
          example: {}
    ServerError:
      type: object
      properties:
        message:
          type: string
          example: 'Internal Server Error'
        error:
          type: string
          example: 'Unexpected error occurred'
    UserSafe:
      type: object
      description: 'User object with password_hash excluded'
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John
        surname:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john@example.com
        role_id:
          type: integer
          description: '1=Admin, 2=Reviewer, 3=Editor, 4=Auditor, 5=SuperAdmin'
          example: 1
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_demo:
          type: boolean
          default: false
        organization_id:
          type: integer
          nullable: true
          example: 1
        profile_photo_id:
          type: integer
          nullable: true
      required:
        - id
        - name
        - surname
        - email
        - role_id
        - created_at
    StatusEnvelope:
      type: object
      properties:
        message:
          type: string
          description: 'HTTP status text (e.g. "OK", "Created", "Accepted")'
        data:
          description: 'Response payload (varies by endpoint)'
    ErrorEnvelope:
      type: object
      properties:
        message:
          type: string
          description: 'HTTP status text or error category'
        data:
          type: string
          description: 'Error detail message'
    ProgressResponse:
      type: object
      properties:
        assessmentsMetadata:
          type: array
          items:
            type: object
            properties:
              projectId:
                type: integer
              totalAssessments:
                type: integer
              doneAssessments:
                type: integer
        controlsMetadata:
          type: array
          items:
            type: object
            properties:
              projectId:
                type: integer
              totalSubControls:
                type: integer
              doneSubControls:
                type: integer
        allTotalAssessments:
          type: integer
        allDoneAssessments:
          type: integer
        allTotalSubControls:
          type: integer
        allDoneSubControls:
          type: integer
    Vendor:
      type: object
      properties:
        id:
          type: integer
          description: 'Auto-generated primary key'
          example: 42
        order_no:
          type: integer
          nullable: true
          description: 'Display order number'
        vendor_name:
          type: string
          description: 'Name of the vendor'
          example: 'Acme Corp'
        vendor_provides:
          type: string
          description: 'What the vendor provides'
          example: 'Cloud hosting services'
        assignee:
          type: integer
          description: 'User ID of the assigned owner'
          example: 5
        website:
          type: string
          description: 'Vendor website URL'
          example: 'https://acme.example.com'
        vendor_contact_person:
          type: string
          description: 'Name of the vendor contact'
          example: 'Jane Doe'
        review_result:
          type: string
          nullable: true
          description: 'Free-text review result summary'
        review_status:
          type: string
          nullable: true
          enum:
            - 'Not started'
            - 'In review'
            - Reviewed
            - 'Requires follow-up'
          default: 'Not started'
          description: 'Current review lifecycle status'
        reviewer:
          type: integer
          nullable: true
          description: 'User ID of the reviewer'
        review_date:
          type: string
          format: date-time
          nullable: true
          description: 'Date the review was performed (ISO 8601)'
        is_demo:
          type: boolean
          default: false
          description: 'Whether this is a demo vendor (read-only after creation)'
        projects:
          type: array
          items:
            type: integer
          description: 'Array of associated project IDs'
        data_sensitivity:
          type: string
          nullable: true
          enum:
            - None
            - 'Internal only'
            - 'Personally identifiable information (PII)'
            - 'Financial data'
            - 'Health data (e.g. HIPAA)'
            - 'Model weights or AI assets'
            - 'Other sensitive data'
          description: 'Scorecard - type of data the vendor accesses'
        business_criticality:
          type: string
          nullable: true
          enum:
            - 'Low (vendor supports non-core functions)'
            - 'Medium (affects operations but is replaceable)'
            - 'High (critical to core services or products)'
          description: 'Scorecard - how critical the vendor is to operations'
        past_issues:
          type: string
          nullable: true
          enum:
            - None
            - 'Minor incident (e.g. small delay, minor bug)'
            - 'Major incident (e.g. data breach, legal issue)'
          description: 'Scorecard - history of past incidents'
        regulatory_exposure:
          type: string
          nullable: true
          enum:
            - None
            - 'GDPR (EU)'
            - 'HIPAA (US)'
            - 'SOC 2'
            - 'ISO 27001'
            - 'EU AI act'
            - 'CCPA (california)'
            - Other
          description: 'Scorecard - applicable regulatory framework'
        risk_score:
          type: integer
          nullable: true
          description: 'Computed risk score for the vendor'
        created_at:
          type: string
          format: date-time
          description: 'Creation timestamp (ISO 8601)'
        updated_at:
          type: string
          format: date-time
          description: 'Last update timestamp (ISO 8601)'
      required:
        - vendor_name
        - vendor_provides
        - assignee
        - website
        - vendor_contact_person
    VendorWithReviewerName:
      allOf:
        -
          $ref: '#/components/schemas/Vendor'
        -
          type: object
          properties:
            reviewer_name:
              type: string
              description: 'Full name of the reviewer (joined from users table)'
              example: 'John Smith'
    VendorInput:
      type: object
      required:
        - vendor_name
        - vendor_provides
        - assignee
        - website
        - vendor_contact_person
      properties:
        vendor_name:
          type: string
          description: 'Name of the vendor (required, non-empty)'
        vendor_provides:
          type: string
          description: 'What the vendor provides (required, non-empty)'
        assignee:
          type: integer
          minimum: 1
          description: 'User ID of the assigned owner (required, >= 1)'
        website:
          type: string
          description: 'Vendor website URL (required, non-empty)'
        vendor_contact_person:
          type: string
          description: 'Name of the vendor contact (required, non-empty)'
        review_result:
          type: string
          description: 'Free-text review result summary'
        review_status:
          type: string
          enum:
            - 'Not started'
            - 'In review'
            - Reviewed
            - 'Requires follow-up'
          description: 'Current review lifecycle status'
        reviewer:
          type: integer
          minimum: 1
          description: 'User ID of the reviewer'
        review_date:
          type: string
          format: date-time
          description: 'Date of the review (ISO 8601)'
        order_no:
          type: integer
          description: 'Display order number'
        is_demo:
          type: boolean
          default: false
          description: 'Mark as demo vendor'
        projects:
          type: array
          items:
            type: integer
          description: 'Array of project IDs to associate'
        data_sensitivity:
          type: string
          enum:
            - None
            - 'Internal only'
            - 'Personally identifiable information (PII)'
            - 'Financial data'
            - 'Health data (e.g. HIPAA)'
            - 'Model weights or AI assets'
            - 'Other sensitive data'
        business_criticality:
          type: string
          enum:
            - 'Low (vendor supports non-core functions)'
            - 'Medium (affects operations but is replaceable)'
            - 'High (critical to core services or products)'
        past_issues:
          type: string
          enum:
            - None
            - 'Minor incident (e.g. small delay, minor bug)'
            - 'Major incident (e.g. data breach, legal issue)'
        regulatory_exposure:
          type: string
          enum:
            - None
            - 'GDPR (EU)'
            - 'HIPAA (US)'
            - 'SOC 2'
            - 'ISO 27001'
            - 'EU AI act'
            - 'CCPA (california)'
            - Other
        risk_score:
          type: integer
          description: 'Computed risk score'
    VendorUpdate:
      type: object
      description: 'All fields are optional. Only provided fields are updated. Review and scorecard fields can be set to null to clear them.'
      properties:
        vendor_name:
          type: string
        vendor_provides:
          type: string
        assignee:
          type: integer
          minimum: 1
        website:
          type: string
        vendor_contact_person:
          type: string
        review_result:
          type: string
          nullable: true
        review_status:
          type: string
          nullable: true
          enum:
            - 'Not started'
            - 'In review'
            - Reviewed
            - 'Requires follow-up'
        reviewer:
          type: integer
          nullable: true
        review_date:
          type: string
          format: date-time
          nullable: true
        order_no:
          type: integer
        projects:
          type: array
          items:
            type: integer
        data_sensitivity:
          type: string
          nullable: true
          enum:
            - None
            - 'Internal only'
            - 'Personally identifiable information (PII)'
            - 'Financial data'
            - 'Health data (e.g. HIPAA)'
            - 'Model weights or AI assets'
            - 'Other sensitive data'
        business_criticality:
          type: string
          nullable: true
          enum:
            - 'Low (vendor supports non-core functions)'
            - 'Medium (affects operations but is replaceable)'
            - 'High (critical to core services or products)'
        past_issues:
          type: string
          nullable: true
          enum:
            - None
            - 'Minor incident (e.g. small delay, minor bug)'
            - 'Major incident (e.g. data breach, legal issue)'
        regulatory_exposure:
          type: string
          nullable: true
          enum:
            - None
            - 'GDPR (EU)'
            - 'HIPAA (US)'
            - 'SOC 2'
            - 'ISO 27001'
            - 'EU AI act'
            - 'CCPA (california)'
            - Other
        risk_score:
          type: integer
          nullable: true
    ModelInventoryStatus:
      type: string
      enum:
        - Approved
        - Restricted
        - Pending
        - Blocked
        - Rejected
      description: 'Current approval/review status of the model'
    Filedata:
      type: object
      description: 'Metadata for an uploaded security-assessment file'
      properties:
        id:
          type: integer
          description: 'File record ID'
        filename:
          type: string
          description: 'Original file name'
        size:
          type: integer
          description: 'File size in bytes'
        mimetype:
          type: string
          description: 'MIME type (e.g. application/pdf)'
        upload_date:
          type: string
          format: date-time
          description: 'ISO 8601 upload timestamp'
        uploaded_by:
          type: integer
          description: 'User ID who uploaded the file'
      required:
        - id
        - filename
        - size
        - mimetype
        - upload_date
        - uploaded_by
    ModelInventoryResponse:
      type: object
      description: 'Model inventory record as returned by the API'
      properties:
        id:
          type: integer
          description: 'Auto-generated primary key'
          example: 42
        provider_model:
          type: string
          nullable: true
          description: 'Legacy combined provider+model field (backward compatibility)'
          example: 'OpenAI / GPT-4'
        provider:
          type: string
          description: 'Model provider name'
          example: OpenAI
        model:
          type: string
          description: 'Model name'
          example: GPT-4
        version:
          type: string
          description: 'Model version identifier'
          example: turbo-2024-04-09
        approver:
          type: integer
          nullable: true
          description: 'User ID of the assigned approver'
          example: 7
        capabilities:
          type: array
          items:
            type: string
          description: "List of capability strings. Stored as comma-separated text in the DB, returned as an array.\n"
          example:
            - 'Text Generation'
            - 'Code Generation'
            - Reasoning
        security_assessment:
          type: boolean
          description: 'Whether a security assessment has been completed'
          example: false
        status:
          $ref: '#/components/schemas/ModelInventoryStatus'
        status_date:
          type: string
          format: date-time
          description: 'ISO 8601 timestamp of the last status change'
          example: '2026-04-15T10:30:00.000Z'
        reference_link:
          type: string
          nullable: true
          description: 'URL to external model documentation or model card'
          example: 'https://platform.openai.com/docs/models/gpt-4'
        biases:
          type: string
          description: 'Known biases of the model'
          example: 'May reflect biases present in training data'
        limitations:
          type: string
          description: 'Known limitations of the model'
          example: 'Knowledge cutoff, potential hallucinations'
        hosting_provider:
          type: string
          description: 'Where the model is hosted'
          example: 'Azure OpenAI'
        security_assessment_data:
          type: array
          items:
            $ref: '#/components/schemas/Filedata'
          description: 'Uploaded security assessment file metadata'
        is_demo:
          type: boolean
          description: 'Whether this is a demo/sample record'
          example: false
        created_at:
          type: string
          format: date-time
          description: 'ISO 8601 creation timestamp'
          example: '2026-04-10T08:00:00.000Z'
        updated_at:
          type: string
          format: date-time
          description: 'ISO 8601 last-updated timestamp'
          example: '2026-04-15T10:30:00.000Z'
        projects:
          type: array
          items:
            type: integer
          description: 'IDs of projects this model is associated with'
          example:
            - 1
            - 3
        frameworks:
          type: array
          items:
            type: integer
          description: 'IDs of frameworks this model is associated with'
          example:
            - 5
    ModelInventoryCreateRequest:
      type: object
      description: 'Request body for creating a new model inventory record'
      required:
        - provider
        - model
        - version
        - capabilities
        - status
        - status_date
        - reference_link
        - biases
        - limitations
        - hosting_provider
      properties:
        provider_model:
          type: string
          description: 'Legacy combined provider+model field (optional, backward compatibility)'
          example: 'OpenAI / GPT-4'
        provider:
          type: string
          description: 'Model provider name'
          example: OpenAI
        model:
          type: string
          description: 'Model name'
          example: GPT-4
        version:
          type: string
          description: 'Model version identifier'
          example: turbo-2024-04-09
        approver:
          type: integer
          nullable: true
          description: 'User ID of the assigned approver'
          example: 7
        capabilities:
          oneOf:
            -
              type: string
              description: 'Comma-separated capabilities'
            -
              type: array
              items:
                type: string
              description: 'Array of capability strings'
          description: "Accepted as either a comma-separated string or an array of strings. Arrays are joined with \", \" before storage.\n"
          example:
            - 'Text Generation'
            - 'Code Generation'
        security_assessment:
          type: boolean
          description: 'Whether a security assessment has been completed'
          default: false
        status:
          $ref: '#/components/schemas/ModelInventoryStatus'
        status_date:
          type: string
          format: date-time
          description: 'ISO 8601 timestamp for the status'
          example: '2026-04-15T10:30:00.000Z'
        reference_link:
          type: string
          description: 'URL to external model documentation or model card'
          example: 'https://platform.openai.com/docs/models/gpt-4'
        biases:
          type: string
          description: 'Known biases of the model'
          example: 'May reflect biases present in training data'
        limitations:
          type: string
          description: 'Known limitations of the model'
          example: 'Knowledge cutoff, potential hallucinations'
        hosting_provider:
          type: string
          description: 'Where the model is hosted'
          example: 'Azure OpenAI'
        security_assessment_data:
          type: array
          items:
            $ref: '#/components/schemas/Filedata'
          description: 'Uploaded security assessment file metadata'
          default: []
        is_demo:
          type: boolean
          description: 'Whether this is a demo/sample record'
          default: false
        projects:
          type: array
          items:
            type: integer
          description: 'Project IDs to associate with this model'
