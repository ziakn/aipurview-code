          type: array
          items:
            type: object
            required:
              - right_key
            properties:
              right_key:
                type: string
              flagged:
                type: boolean
              severity:
                type: integer
              confidence:
                type: integer
              impact_pathway:
                type: string
              mitigation:
                type: string
    FriaRiskItem:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        fria_id:
          type: integer
        risk_description:
          type: string
        likelihood:
          $ref: '#/components/schemas/FriaLikelihood'
        severity:
          $ref: '#/components/schemas/FriaSeverity'
        existing_controls:
          type: string
          nullable: true
        further_action:
          type: string
          nullable: true
        linked_project_risk_id:
          type: integer
          nullable: true
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
        linked_risk_name:
          type: string
          nullable: true
        linked_risk_description:
          type: string
          nullable: true
    FriaRiskItemCreateRequest:
      type: object
      required:
        - risk_description
      properties:
        risk_description:
          type: string
        likelihood:
          $ref: '#/components/schemas/FriaLikelihood'
        severity:
          $ref: '#/components/schemas/FriaSeverity'
        existing_controls:
          type: string
        further_action:
          type: string
        linked_project_risk_id:
          type: integer
        sort_order:
          type: integer
    FriaRiskItemUpdateRequest:
      type: object
      properties:
        risk_description:
          type: string
        likelihood:
          $ref: '#/components/schemas/FriaLikelihood'
        severity:
          $ref: '#/components/schemas/FriaSeverity'
        existing_controls:
          type: string
        further_action:
          type: string
        linked_project_risk_id:
          type: integer
        sort_order:
          type: integer
    FriaModelLink:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        fria_id:
          type: integer
        model_id:
          type: integer
        provider:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        model_status:
          type: string
          nullable: true
    FriaEvidenceLinkRequest:
      type: object
      required:
        - file_id
        - entity_type
      properties:
        file_id:
          type: integer
        entity_type:
          type: string
    FriaSnapshot:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        fria_id:
          type: integer
        version:
          type: integer
        snapshot_data:
          type: object
          properties:
            assessment:
              $ref: '#/components/schemas/FriaAssessment'
            rights:
              type: array
              items:
                $ref: '#/components/schemas/FriaRight'
            riskItems:
              type: array
              items:
                $ref: '#/components/schemas/FriaRiskItem'
            modelLinks:
              type: array
              items:
                $ref: '#/components/schemas/FriaModelLink'
        snapshot_reason:
          type: string
          nullable: true
        created_by:
          type: integer
        created_at:
          type: string
          format: date-time
        created_by_name:
          type: string
          nullable: true
    FriaSubmitRequest:
      type: object
      properties:
        reason:
          type: string
    StandardResponse:
      type: object
      properties:
        message:
          type: string
        data:
          description: 'Response payload (present on 1xx-4xx)'
        error:
          type: string
    ErrorResponse400:
      type: object
      properties:
        message:
          type: string
          example: 'Bad Request'
        data:
          type: string
          example: 'userId query parameter is required'
    ErrorResponse401:
      type: object
      properties:
        message:
          type: string
          example: Unauthorized
        data:
          type: string
    ErrorResponse403:
      type: object
      properties:
        message:
          type: string
          example: Forbidden
        data:
          type: string
    ErrorResponse404:
      type: object
      properties:
        message:
          type: string
          example: 'Not Found'
        data:
          type: string
    ErrorResponse500:
      type: object
      properties:
        message:
          type: string
          example: 'Internal Server Error'
        error:
          type: string
    SlackNotificationRoutingType:
      type: string
      enum:
        - 'Membership and roles'
        - 'Projects and organizations'
        - 'Policy reminders and status'
        - 'Evidence and task alerts'
        - 'Control or policy changes'
    SlackWebhookFull:
      type: object
      properties:
        id:
          type: integer
          example: 1
        access_token:
          type: string
        access_token_iv:
          type: string
        scope:
          type: string
          example: 'incoming-webhook,chat:write'
        user_id:
          type: integer
          example: 5
        team_name:
          type: string
          example: 'Acme Corp'
        team_id:
          type: string
          example: T01234ABC
        channel:
          type: string
          example: '#general'
        channel_id:
          type: string
          example: C01234ABC
        configuration_url:
          type: string
          format: uri
        url:
          type: string
        url_iv:
          type: string
        is_active:
          type: boolean
          example: true
        routing_type:
          type: array
          items:
            $ref: '#/components/schemas/SlackNotificationRoutingType'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SlackWebhookJSON:
      type: object
      properties:
        id:
          type: integer
        scope:
          type: string
        user_id:
          type: integer
        team_name:
          type: string
        team_id:
          type: string
        channel:
          type: string
        channel_id:
          type: string
        created_at:
          type: string
          format: date-time
        is_active:
          type: boolean
        routing_type:
          type: array
          items:
            $ref: '#/components/schemas/SlackNotificationRoutingType'
          nullable: true
    CreateSlackWebhookRequest:
      type: object
      required:
        - code
        - userId
      properties:
        code:
          type: string
          example: 1234567890.abcdef
        userId:
          type: integer
          example: 5
    UpdateSlackWebhookRequest:
      type: object
      properties:
        is_active:
          type: boolean
          example: false
        routing_type:
          type: array
          items:
            $ref: '#/components/schemas/SlackNotificationRoutingType'
    SendSlackMessageRequest:
      type: object
      required:
        - title
        - message
      properties:
        title:
          type: string
          example: 'New policy update'
        message:
          type: string
          example: 'Policy *Data Retention* has been updated.'
    SlackMessageSentResult:
      type: object
      properties:
        success:
          type: boolean
          example: true
        messageId:
          type: string
          example: '1234567890.123456'
        channel:
          type: string
          example: C01234ABC
    GitHubTokenStatus:
      type: object
      properties:
        configured:
          type: boolean
          example: true
        token_name:
          type: string
          example: 'GitHub Personal Access Token'
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    SaveGitHubTokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        token_name:
          type: string
          default: 'GitHub Personal Access Token'
          example: 'CI/CD Scanner Token'
    TestGitHubTokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    GitHubTokenTestResult:
      type: object
      properties:
        valid:
          type: boolean
          example: true
        scopes:
          type: array
          items:
            type: string
          example:
            - repo
            - 'read:org'
        rate_limit:
          type: object
          properties:
            limit:
              type: integer
              example: 5000
            remaining:
              type: integer
              example: 4999
            reset:
              type: string
              format: date-time
        error:
          type: string
          example: 'Invalid or expired token'
    GitHubWebhookPayload:
      type: object
      required:
        - repository
      properties:
        repository:
          type: object
          required:
            - owner
            - name
          properties:
            owner:
              type: object
              required:
                - login
              properties:
                login:
                  type: string
                  example: verifywise-ai
            name:
              type: string
              example: verifywise
        ref:
          type: string
          example: refs/heads/main
        action:
          type: string
          example: opened
        pull_request:
          type: object
    GitHubWebhookResult:
      type: object
      properties:
        triggered:
          type: boolean
        reason:
          type: string
          example: 'Scan triggered for push to main'
    GitHubWebhookPong:
      type: object
      properties:
        message:
          type: string
          example: pong
    GitHubWebhookSkipped:
      type: object
      properties:
        message:
          type: string
          example: 'Repository not registered or CI not enabled'
    SuccessResponse_SlackWebhookArray:
      type: object
      properties:
        message:
          type: string
          example: OK
        data:
          type: array
          items:
            $ref: '#/components/schemas/SlackWebhookFull'
    SuccessResponse_SlackWebhookJSON:
      type: object
      properties:
        message:
          type: string
          example: OK
        data:
          $ref: '#/components/schemas/SlackWebhookJSON'
    CreatedResponse_SlackWebhookFull:
      type: object
      properties:
        message:
          type: string
          example: Created
        data:
          $ref: '#/components/schemas/SlackWebhookFull'
    AcceptedResponse_SlackWebhookFull:
      type: object
      properties:
        message:
          type: string
          example: Accepted
        data:
          $ref: '#/components/schemas/SlackWebhookFull'
    SuccessResponse_SlackMessageSent:
      type: object
      properties:
        message:
          type: string
          example: OK
        data:
          $ref: '#/components/schemas/SlackMessageSentResult'
    SuccessResponse_GitHubTokenStatus:
      type: object
      properties:
        message:
          type: string
          example: OK
        data:
          $ref: '#/components/schemas/GitHubTokenStatus'
    CreatedResponse_GitHubTokenStatus:
      type: object
      properties:
        message:
          type: string
          example: Created
        data:
          $ref: '#/components/schemas/GitHubTokenStatus'
    SuccessResponse_GitHubTokenDeleted:
      type: object
      properties:
        message:
          type: string
          example: OK
        data:
          type: object
          properties:
            message:
              type: string
              example: 'GitHub token deleted successfully'
    SuccessResponse_GitHubTokenTest:
      type: object
      properties:
        message:
          type: string
          example: OK
        data:
          $ref: '#/components/schemas/GitHubTokenTestResult'
