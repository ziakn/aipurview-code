version: '3.9'

services:
  postgresdb:
    ports:
      - $LOCAL_DB_PORT:$DB_PORT

  backend:
    build:
      context: ./Servers
      dockerfile: Dockerfile.dev
    # volumes:
    #   - ./Servers/:/app
    env_file:
      - ./.env.dev

  frontend:
    build:
      context: ./Clients
      dockerfile: Dockerfile.dev
    volumes:
      - ./Clients/src:/app/src
    ports:
      - $FRONTEND_PORT:$FRONTEND_PORT
    env_file:
      - ./.env.dev
    environment:
      - VITE_APP_PORT=$FRONTEND_PORT

  # bias_and_fairness_backend:
  #   build:
  #     context: ./BiasAndFairnessServers
  #     dockerfile: Dockerfile.dev
  #   volumes:
  #     - ./BiasAndFairnessServers/src:/app

  eval_server:
    build:
      context: ./EvalServer
      dockerfile: Dockerfile.dev
    volumes:
      - ./EvalServer/src:/app
      - eval_uploads-dev:/app/data/uploads

  ai_gateway:
    build:
      context: ./AIGateway
      dockerfile: Dockerfile.dev
    # volumes:
    #   - ./AIGateway/src:/app
    env_file:
      - ./.env.dev

volumes:
  eval_uploads-dev:
