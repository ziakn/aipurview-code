version: '3.9'

services:
  postgresdb:
    ports:
      - $LOCAL_DB_PORT:$DB_PORT

  backend:
    build:
      context: ./Servers
      dockerfile: Dockerfile.dev
    pull_policy: never
    # volumes:
    #   - ./Servers/:/app
    env_file:
      - ./.env.dev

  frontend:
    build:
      context: ./Clients
      dockerfile: Dockerfile.dev
    pull_policy: never
    command: ["npm", "run", "dev:vite"]
    volumes:
      - ./Clients/src:/app/src
      - ./shared:/shared:ro
      - ./version.json:/version.json:ro
    ports:
      - $FRONTEND_PORT:$FRONTEND_PORT
    env_file:
      - ./.env.dev
    environment:
      - VITE_APP_PORT=$FRONTEND_PORT
      - VITE_API_PROXY_TARGET=http://backend:$BACKEND_PORT

  worker:
    build:
      context: ./Servers
      dockerfile: Dockerfile.dev
    pull_policy: never
    command: ["sh", "-c", "npm run build && npm run worker"]
    env_file:
      - ./.env.dev

  # bias_and_fairness_backend:
  #   build:
  #     context: ./BiasAndFairnessServers
  #     dockerfile: Dockerfile.dev
  #   volumes:
  #     - ./BiasAndFairnessServers/src:/app

  eval_server:
    build:
      context: ./EvalServer
      dockerfile: Dockerfile.dev
    pull_policy: never
    volumes:
      - ./EvalServer/src:/app
      - eval_uploads-dev:/app/data/uploads

  ai_gateway:
    build:
      context: ./AIGateway
      dockerfile: Dockerfile.dev
    pull_policy: never
    # volumes:
    #   - ./AIGateway/src:/app
    env_file:
      - ./.env.dev

volumes:
  eval_uploads-dev:
