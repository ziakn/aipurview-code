# VerifyWise LLM Evaluation — Reusable Workflow
#
# Runs an LLM evaluation on your VerifyWise instance, waits for results,
# and optionally posts a summary on the PR and/or gates CI on thresholds.
#
# Supports three use cases:
#   - Chatbot: answer_relevancy, bias, toxicity, hallucination, ...
#   - RAG:     faithfulness, contextual_relevancy, context_precision, context_recall, ...
#   - Agent:   tool_correctness, task_completion, plan_quality, step_efficiency, ...
#
# ─── Quick start ────────────────────────────────────────────────────────
#
#   # Chatbot evaluation
#   jobs:
#     eval:
#       uses: verifywise-ai/verifywise/.github/workflows/verifywise-eval.yml@main
#       with:
#         api_url: https://app.verifywise.ai
#         project_id: proj_abc123
#         dataset_id: "42"
#         metrics: answer_relevancy,bias,toxicity
#         model_name: gpt-4o-mini
#         model_provider: openai
#       secrets:
#         VW_API_TOKEN: ${{ secrets.VW_API_TOKEN }}
#         LLM_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
#
#   # RAG evaluation
#   jobs:
#     eval:
#       uses: verifywise-ai/verifywise/.github/workflows/verifywise-eval.yml@main
#       with:
#         api_url: https://app.verifywise.ai
#         project_id: proj_abc123
#         dataset_id: "42"
#         metrics: faithfulness,contextual_relevancy,answer_relevancy
#         model_name: gpt-4o
#         model_provider: openai
#       secrets:
#         VW_API_TOKEN: ${{ secrets.VW_API_TOKEN }}
#         LLM_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
#
#   # Agent evaluation
#   jobs:
#     eval:
#       uses: verifywise-ai/verifywise/.github/workflows/verifywise-eval.yml@main
#       with:
#         api_url: https://app.verifywise.ai
#         project_id: proj_abc123
#         dataset_id: "42"
#         metrics: tool_correctness,task_completion,plan_quality
#         model_name: gpt-4o
#         model_provider: openai
#       secrets:
#         VW_API_TOKEN: ${{ secrets.VW_API_TOKEN }}
#         LLM_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
#
# ─── Available metrics ──────────────────────────────────────────────────
#
#   Universal:  answer_relevancy, correctness, completeness,
#               hallucination*, toxicity*, bias*,
#               instruction_following
#
#   RAG:        faithfulness, contextual_relevancy,
#               context_precision, context_recall
#
#   Agent:      tool_correctness, argument_correctness,
#               task_completion, step_efficiency,
#               plan_quality, plan_adherence
#
#   (* = inverted metric — lower is better)
# ────────────────────────────────────────────────────────────────────────

name: VerifyWise LLM Evaluation

on:
  workflow_call:
    inputs:
      api_url:
        description: "VerifyWise instance URL (e.g. https://app.verifywise.ai)"
        required: true
        type: string
      project_id:
        description: "Project ID"
        required: true
        type: string
      dataset_id:
        description: "Dataset ID to evaluate against"
        required: true
        type: string
      metrics:
        description: "Comma-separated metric names"
        required: true
        type: string
      model_name:
        description: "Model to evaluate (e.g. gpt-4o-mini)"
        required: true
        type: string
      model_provider:
        description: "Provider: openai, anthropic, google, mistral, xai, self-hosted"
        required: true
        type: string
      judge_model:
        description: "Judge LLM for scoring"
        required: false
        type: string
        default: "gpt-4o"
      judge_provider:
        description: "Judge LLM provider"
        required: false
        type: string
        default: "openai"
      threshold:
        description: "Pass/fail threshold (0.0–1.0)"
        required: false
        type: string
        default: "0.7"
      timeout_minutes:
        description: "Max wait time in minutes"
        required: false
        type: string
        default: "30"
      poll_interval_seconds:
        description: "Seconds between status polls"
        required: false
        type: string
        default: "15"
      experiment_name:
        description: "Custom experiment name"
        required: false
        type: string
        default: ""
      fail_on_threshold:
        description: "Fail CI when thresholds are not met"
        required: false
        type: boolean
        default: true
      post_pr_comment:
        description: "Post results as a PR comment"
        required: false
        type: boolean
        default: true
    secrets:
      VW_API_TOKEN:
        description: "VerifyWise API token"
        required: true
      LLM_API_KEY:
        description: "LLM provider API key"
        required: true

jobs:
  evaluate:
    name: LLM Evaluation
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Run evaluation
        id: eval
        uses: verifywise-ai/verifywise-eval-action@v1
        with:
          api_url: ${{ inputs.api_url }}
          project_id: ${{ inputs.project_id }}
          dataset_id: ${{ inputs.dataset_id }}
          metrics: ${{ inputs.metrics }}
          model_name: ${{ inputs.model_name }}
          model_provider: ${{ inputs.model_provider }}
          judge_model: ${{ inputs.judge_model }}
          judge_provider: ${{ inputs.judge_provider }}
          threshold: ${{ inputs.threshold }}
          timeout_minutes: ${{ inputs.timeout_minutes }}
          poll_interval_seconds: ${{ inputs.poll_interval_seconds }}
          experiment_name: ${{ inputs.experiment_name }}
          fail_on_threshold: ${{ inputs.fail_on_threshold }}
          vw_api_token: ${{ secrets.VW_API_TOKEN }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}

      - name: Post PR comment
        if: inputs.post_pr_comment && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '${{ steps.eval.outputs.summary_path }}';
            if (!summaryPath || !fs.existsSync(summaryPath)) return;
            const body = fs.readFileSync(summaryPath, 'utf8');
            const marker = '<!-- verifywise-eval -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
