# VerifyWise LLM Evaluation — Reusable GitHub Actions Workflow
#
# Triggers an LLM evaluation on a VerifyWise instance, polls for results,
# and optionally posts a summary as a PR comment and/or fails CI if
# thresholds are not met.
#
# This workflow uses the standalone action from:
#   https://github.com/verifywise-ai/verifywise-eval-action
#
# Usage (in your repo's workflow):
#
#   jobs:
#     eval:
#       uses: verifywise-ai/verifywise/.github/workflows/verifywise-eval.yml@main
#       with:
#         api_url: https://your-verifywise-instance.com
#         project_id: <uuid>
#         dataset_id: <uuid>
#         metrics: "answerRelevancy,faithfulness,hallucination"
#         model_name: gpt-4o
#         model_provider: openai
#       secrets:
#         VW_API_TOKEN: ${{ secrets.VW_API_TOKEN }}
#         LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

name: VerifyWise LLM Evaluation

on:
  workflow_call:
    inputs:
      api_url:
        description: "Base URL of the VerifyWise instance (e.g. https://app.verifywise.ai)"
        required: true
        type: string
      project_id:
        description: "VerifyWise project ID"
        required: true
        type: string
      dataset_id:
        description: "Dataset ID to evaluate against"
        required: true
        type: string
      metrics:
        description: "Comma-separated metric names (e.g. answerRelevancy,faithfulness,hallucination)"
        required: true
        type: string
      model_name:
        description: "Model to evaluate (e.g. gpt-4o, claude-3.5-sonnet)"
        required: true
        type: string
      model_provider:
        description: "Model provider (openai, anthropic, google, mistral, xai, self-hosted)"
        required: true
        type: string
      judge_model:
        description: "Judge LLM model name"
        required: false
        type: string
        default: "gpt-4o"
      judge_provider:
        description: "Judge LLM provider"
        required: false
        type: string
        default: "openai"
      threshold:
        description: "Global pass threshold (0-1). Metrics below this fail CI."
        required: false
        type: string
        default: "0.7"
      timeout_minutes:
        description: "Max minutes to wait for evaluation to complete"
        required: false
        type: string
        default: "30"
      poll_interval_seconds:
        description: "Seconds between status polls"
        required: false
        type: string
        default: "15"
      experiment_name:
        description: "Custom experiment name (defaults to commit-based name)"
        required: false
        type: string
        default: ""
      fail_on_threshold:
        description: "Whether to fail the CI check when thresholds are not met"
        required: false
        type: boolean
        default: true
      post_pr_comment:
        description: "Whether to post a summary comment on the PR"
        required: false
        type: boolean
        default: true
    secrets:
      VW_API_TOKEN:
        description: "VerifyWise JWT token or API key for authentication"
        required: true
      LLM_API_KEY:
        description: "API key for the LLM provider being evaluated"
        required: true

jobs:
  evaluate:
    name: Run LLM Evaluation
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Run VerifyWise evaluation
        id: eval
        uses: verifywise-ai/verifywise-eval-action@v1
        with:
          api_url: ${{ inputs.api_url }}
          project_id: ${{ inputs.project_id }}
          dataset_id: ${{ inputs.dataset_id }}
          metrics: ${{ inputs.metrics }}
          model_name: ${{ inputs.model_name }}
          model_provider: ${{ inputs.model_provider }}
          judge_model: ${{ inputs.judge_model }}
          judge_provider: ${{ inputs.judge_provider }}
          threshold: ${{ inputs.threshold }}
          timeout_minutes: ${{ inputs.timeout_minutes }}
          poll_interval_seconds: ${{ inputs.poll_interval_seconds }}
          experiment_name: ${{ inputs.experiment_name }}
          fail_on_threshold: ${{ inputs.fail_on_threshold }}
          vw_api_token: ${{ secrets.VW_API_TOKEN }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}

      - name: Post PR comment
        if: inputs.post_pr_comment && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '${{ steps.eval.outputs.summary_path }}';
            if (!summaryPath || !fs.existsSync(summaryPath)) {
              console.log('No summary file found, skipping PR comment');
              return;
            }
            const body = fs.readFileSync(summaryPath, 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- verifywise-eval-results -->';
            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
