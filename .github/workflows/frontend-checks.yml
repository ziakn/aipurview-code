name: Frontend Checks

permissions:
  contents: read
  security-events: write

on:
  pull_request:
    branches: ['master', 'develop']
    paths:
      - 'Clients/**'
  push:
    branches: ['master', 'develop']
    paths:
      - 'Clients/**'

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Clients

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Clients/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run npm audit (JSON output for review)
        run: npm audit --json > ../audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v7
        with:
          name: frontend-npm-audit-results
          path: audit-results.json
          retention-days: 30

  lint-and-typecheck:
    name: Lint, Types & i18n
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Clients

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Clients/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prettier format check
        run: npm run format-check

      - name: TypeScript type check
        run: npm run typecheck

      - name: i18n audit (catch dictionary drift)
        run: npm run i18n:audit:strict

  unit-and-component-tests:
    name: Unit & Component Tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    defaults:
      run:
        working-directory: Clients

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Clients/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: npx vitest run --shard=${{ matrix.shard }}/4

  # Coverage is the slowest path, so it runs as its own job only on push to a
  # protected branch (not on every PR). Pull requests rely on the sharded
  # test matrix above for pass/fail.
  coverage:
    name: Coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Clients

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Clients/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: Clients/coverage/
          retention-days: 14

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
