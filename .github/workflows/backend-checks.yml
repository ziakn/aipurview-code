name: Backend Checks

permissions:
  contents: read
  security-events: write

on:
  pull_request:
    branches: ["master", "develop"]
    paths:
      - "Servers/**"
  push:
    branches: ["master", "develop"]
    paths:
      - "Servers/**"

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Servers

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run npm audit (JSON output for review)
        run: npm audit --json > ../audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v7
        with:
          name: backend-npm-audit-results
          path: audit-results.json
          retention-days: 30

  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Servers

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format-check

      - name: TypeScript type check
        run: npm run build

      - name: Run tests
        run: npm test

      - name: i18n audit (catch dictionary drift)
        run: npm run i18n:audit:strict

  tenant-isolation-tests:
    name: Tenant Isolation Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Servers

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run tenant-isolation integration matrix
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: verifywise_test
          NODE_ENV: test
        run: npm run test:integration -- --testPathPatterns=tenant-isolation

      - name: Run schema-drift tenant isolation audit
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: verifywise_test
          NODE_ENV: test
        run: npx ts-node scripts/auditTenantIsolationCoverage.ts

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
