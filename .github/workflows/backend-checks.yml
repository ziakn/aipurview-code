name: Backend Checks

permissions:
  contents: read
  security-events: write

on:
  pull_request:
    branches: ["master", "develop"]
    paths:
      - "Servers/**"
  push:
    branches: ["master", "develop"]
    paths:
      - "Servers/**"

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Servers

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run npm audit (JSON output for review)
        run: npm audit --json > ../audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v7
        with:
          name: backend-npm-audit-results
          path: audit-results.json
          retention-days: 30

  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Servers

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format-check

      - name: TypeScript type check
        run: npm run build

      - name: Run tests
        run: npm test

      - name: i18n audit (catch dictionary drift)
        run: npm run i18n:audit:strict

  api-docs-drift:
    name: API Documentation Drift Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Servers

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Regenerate OpenAPI spec and endpoint registry
        run: |
          npm run generate:swagger
          npm run generate:endpoints

      - name: Format generated files
        run: npx prettier --write swagger.yaml ../docs/api-docs/src/config/endpoints.ts

      - name: Check API documentation drift
        run: npm run check:api-drift

      - name: Ensure generated files are up to date
        run: |
          git diff --exit-code swagger.yaml || { echo "swagger.yaml is out of date. Run 'npm run generate:swagger', format with prettier, and commit the result."; exit 1; }
          git diff --exit-code ../docs/api-docs/src/config/endpoints.ts || { echo "endpoints.ts is out of date. Run 'npm run generate:endpoints', format with prettier, and commit the result."; exit 1; }

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
